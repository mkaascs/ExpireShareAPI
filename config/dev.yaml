env: "dev" # prod, local, dev
db_host: "mysql-expire:3306"
storage:
  type: "local"
  path: "./storage/"
  max_file_size: "500mb"
http_server:
  port: 8080
  timeout: 4s
  idle_timeout: 60s
  cors:
    allowed_credentials: true
    max_age: 86400 # 24h
redis:
  addr: "redis-expire:6379"
  db: 0
  dial_timeout: 10s
  timeout: 5s
  max_retries: 1
service:
  default_ttl: 1h
  default_max_downloads: 1
  alias_length: 6
  file_worker_delay: 5m
  permissions:
    max_uploaded_files_for_vip: 10
    max_uploaded_files_for_user: 1
auth_service:
  addr: "auth-service:5505"
