services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ExpireShare
    volumes:
      - mysql_expire_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  expire-share:
    build: .
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ADMIN_SECRET_BASE64: ${ADMIN_SECRET_BASE64}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - expire_files:/app/storage
    networks:
      - internal
      - shared-network

volumes:
  mysql_expire_data:
  expire_files:
  redis_data:

networks:
  shared-network:
    external: true
    name: services-network
  internal:
    internal: true