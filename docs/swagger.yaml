definitions:
  assign.Request:
    description: Role assignment request
    properties:
      role:
        example: vip
        type: string
    type: object
  assign.Response:
    description: Empty success response
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  entities.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        format: int64
        type: integer
      isAdmin:
        type: boolean
      login:
        type: string
      roles:
        items:
          type: string
        type: array
    type: object
  getAll.GetFile:
    properties:
      alias:
        type: string
      downloads_left:
        type: integer
      expires_at:
        type: string
      filename:
        type: string
      filesize:
        type: integer
    type: object
  internal_delivery_handlers_api_admin_users_get.Response:
    description: Response with user info
    properties:
      errors:
        items:
          type: string
        type: array
      user:
        $ref: '#/definitions/entities.User'
    type: object
  internal_delivery_handlers_api_admin_users_getAll.Response:
    description: Response with paginated users list
    properties:
      errors:
        items:
          type: string
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      users:
        items:
          $ref: '#/definitions/entities.User'
        type: array
    type: object
  internal_delivery_handlers_api_files_get.Response:
    description: Response with file info
    properties:
      downloads_left:
        type: integer
      errors:
        items:
          type: string
        type: array
      expires_in:
        type: string
      filename:
        type: string
      filesize:
        type: integer
    type: object
  internal_delivery_handlers_api_files_getAll.Response:
    description: Response with all user files info
    properties:
      errors:
        items:
          type: string
        type: array
      files:
        items:
          $ref: '#/definitions/getAll.GetFile'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  login.Request:
    description: Login credentials for authentication
    properties:
      login:
        example: user
        maxLength: 64
        minLength: 3
        type: string
      password:
        example: expire123
        maxLength: 128
        minLength: 6
        type: string
    required:
    - login
    - password
    type: object
  login.Response:
    description: Authentication response with tokens
    properties:
      access_token:
        type: string
      errors:
        items:
          type: string
        type: array
      expires_in:
        description: "Token expiration time in seconds\n\t@example\t900"
        type: integer
      refresh_token:
        type: string
    type: object
  logout.Request:
    description: Tokens to invalidate on logout
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    required:
    - access_token
    - refresh_token
    type: object
  refresh.Request:
    description: Refresh token for obtaining new access token
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  refresh.Response:
    description: New access and refresh tokens
    properties:
      access_token:
        type: string
      errors:
        items:
          type: string
        type: array
      expires_in:
        description: "Token expiration time in seconds\n\t@example\t900"
        type: integer
      refresh_token:
        type: string
    type: object
  register.Request:
    description: Registration data for new user account
    properties:
      email:
        example: user@example.com
        type: string
      login:
        example: user
        maxLength: 64
        minLength: 3
        type: string
      password:
        example: expire123
        maxLength: 128
        minLength: 6
        type: string
    required:
    - email
    - login
    - password
    type: object
  register.Response:
    description: Registration response with user ID
    properties:
      errors:
        items:
          type: string
        type: array
      user_id:
        type: integer
    type: object
  response.Response:
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  revoke.Request:
    description: Role revocation request
    properties:
      role:
        example: vip
        type: string
    type: object
  revoke.Response:
    description: Empty success response
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  stat.Response:
    description: Response with user file storage stats
    properties:
      count:
        type: integer
      errors:
        items:
          type: string
        type: array
      max_count:
        type: integer
      max_size:
        type: integer
      occupied_size:
        type: integer
    type: object
  upload.Response:
    description: Response after successful file upload
    properties:
      alias:
        type: string
      errors:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
  description: File sharing service with expiration and download limits
  title: Expire Share API
  version: 1.0.0
paths:
  /api/admin/users:
    get:
      consumes:
      - application/json
      description: Get paginated list of all users. Optionally filter by role. Requires
        admin secret authorization.
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      - description: Filter by role (user, vip, admin)
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Users list
          schema:
            $ref: '#/definitions/internal_delivery_handlers_api_admin_users_getAll.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - admin
  /api/admin/users/{id}:
    get:
      consumes:
      - application/json
      description: Get user info by their ID. Requires admin secret authorization.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User info
          schema:
            $ref: '#/definitions/internal_delivery_handlers_api_admin_users_get.Response'
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - admin
  /api/admin/users/{id}/roles/assign:
    post:
      consumes:
      - application/json
      description: Assign a role to user by their ID. Requires admin secret authorization.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Role to assign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/assign.Request'
      produces:
      - application/json
      responses:
        "201":
          description: Role assigned
          schema:
            $ref: '#/definitions/assign.Response'
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - admin
  /api/admin/users/{id}/roles/revoke:
    post:
      consumes:
      - application/json
      description: Revoke a role from user by their ID. Requires admin secret authorization.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Role to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/revoke.Request'
      produces:
      - application/json
      responses:
        "204":
          description: Role revoked
          schema:
            $ref: '#/definitions/revoke.Response'
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - admin
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with login and password. Returns access and refresh
        tokens.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/login.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/login.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid login or password
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate access and refresh tokens. User will need to login again
        to obtain new tokens.
      parameters:
      - description: Tokens to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/logout.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid tokens
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Get new access token using refresh token. Performs token rotation
        (returns new refresh token).
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/refresh.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully
          schema:
            $ref: '#/definitions/refresh.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create new user account with login, email and password.
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/register.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Registration successful
          schema:
            $ref: '#/definitions/register.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: User with this login or email already exists
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      tags:
      - auth
  /api/file/:
    get:
      consumes:
      - application/json
      description: Get info about all uploaded user files. Requires authentication.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_handlers_api_files_getAll.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - file
  /api/file/{alias}:
    delete:
      consumes:
      - application/json
      description: Deletes uploaded file by its alias. Requires authentication and
        file ownership.
      parameters:
      - description: File alias
        in: path
        name: alias
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden (not file owner)
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - file
    get:
      consumes:
      - application/json
      description: Get info about uploaded file by its alias. Requires authentication
        and file ownership.
      parameters:
      - description: File alias
        in: path
        name: alias
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_handlers_api_files_get.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden (not file owner)
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - file
  /api/file/stat:
    get:
      consumes:
      - application/json
      description: 'Get current user''s file storage statistics: occupied size, total
        count and their limits.'
      produces:
      - application/json
      responses:
        "200":
          description: Storage stats
          schema:
            $ref: '#/definitions/stat.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - file
  /api/upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads file to server with optional password protection, download
        limit, and expiration time. Requires authentication.
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: 'Maximum number of downloads (max: 10000)'
        format: int32
        in: formData
        name: max_downloads
        type: integer
      - description: Time to live (e.g., '1h', '2h30m', '7d')
        in: formData
        name: ttl
        type: string
      - description: File password (optional, required for download if set)
        in: formData
        name: password
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: File uploaded successfully
          schema:
            $ref: '#/definitions/upload.Response'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden (upload limit exceeded)
          schema:
            $ref: '#/definitions/response.Response'
        "413":
          description: File too large
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      tags:
      - file
  /download/{alias}:
    get:
      consumes:
      - application/json
      description: Downloads uploaded file by its alias. If file is password-protected,
        provide password in X-Resource-Password header.
      parameters:
      - description: File alias
        in: path
        name: alias
        required: true
        type: string
      - description: File password (required for password-protected files)
        in: header
        name: X-Resource-Password
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content
          schema:
            type: file
        "403":
          description: File password required or invalid password
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: File not found or has expired
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      tags:
      - file
swagger: "2.0"
